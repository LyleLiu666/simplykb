name: Integration

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      paradedb:
        image: paradedb/paradedb@sha256:2359a3628682f2dfc4ee65ed59f6a993d7851ed3d820b0c030c397ff7168b620
        env:
          POSTGRES_USER: simplykb
          POSTGRES_PASSWORD: simplykb
          POSTGRES_DB: simplykb
        ports:
          - 25432:5432
        options: >-
          --health-cmd "pg_isready -U simplykb -d simplykb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run doctor
        env:
          SIMPLYKB_DATABASE_URL: postgres://simplykb:simplykb@localhost:25432/simplykb?sslmode=disable
        run: go run ./examples/internal/exampleenv/cmd/doctor

      - name: Run integration tests
        env:
          SIMPLYKB_DATABASE_URL: postgres://simplykb:simplykb@localhost:25432/simplykb?sslmode=disable
        run: go test ./... -run Integration -count=1 -v
