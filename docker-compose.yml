services:
  paradedb:
    image: paradedb/paradedb@sha256:2359a3628682f2dfc4ee65ed59f6a993d7851ed3d820b0c030c397ff7168b620
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-simplykb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simplykb}
      POSTGRES_DB: ${POSTGRES_DB:-simplykb}
    ports:
      - "${PARADEDB_PORT:-25432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - paradedb-data:/var/lib/postgresql

volumes:
  paradedb-data:
